services:
  aws-new-postgres:
    container_name: aws-new-postgres
    image: postgres
    environment:
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql 
    networks:
      - default
    restart: unless-stopped # Recommended for database services

  redis:
    container_name: aws-ticket-redis
    image: valkey/valkey:8.1.3-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - default

  aws-ticket-api:
    container_name: aws-ticket-api
    image: aws-ticket-api:latest
    env_file:
      - .env
    ports:
      - "3000:3000"
    depends_on:
      - redis
      - aws-new-postgres 
    networks:
      - default
    restart: unless-stopped

volumes:
  redis_data:
  pg_data:

networks:
  default:
